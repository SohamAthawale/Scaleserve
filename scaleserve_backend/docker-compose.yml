version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: scaleserve_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scaleserve
    ports:
      - "5432:5432"
    volumes:
      - scaleserve_pg_data:/var/lib/postgresql/data

volumes:
  scaleserve_pg_data:
